name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  payment-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify payment-gateway (with tests)
        working-directory: payment-gateway
        run: ./mvnw -B verify

  ledger-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify ledger-service (with tests)
        working-directory: ledger-service
        run: ./mvnw -B verify

  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify analytics (with tests)
        working-directory: analytics
        run: ./mvnw -B verify

  docker-images:
    runs-on: ubuntu-latest
    needs: [payment-gateway, ledger-service, analytics]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build payment-gateway image
        uses: docker/build-push-action@v6
        with:
          context: payment-gateway
          push: false
          tags: swiftpay/payment-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build ledger-service image
        uses: docker/build-push-action@v6
        with:
          context: ledger-service
          push: false
          tags: swiftpay/ledger-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build analytics image
        uses: docker/build-push-action@v6
        with:
          context: analytics
          push: false
          tags: swiftpay/analytics:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
