services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: swiftpay-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: swiftpay-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7-alpine
    container_name: swiftpay-redis
    ports:
      - "6379:6379"

  # Optional local Postgres — not started by default. Use: docker compose --profile local-db up -d
  postgres:
    image: postgres:15-alpine
    container_name: swiftpay-postgres
    profiles:
      - local-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: swiftpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swiftpay"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-gateway:
    build: ./payment-gateway
    container_name: swiftpay-payment-gateway
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-30}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:29092

  ledger-service:
    build: ./ledger-service
    container_name: swiftpay-ledger-service
    depends_on:
      kafka:
        condition: service_started
      payment-gateway:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-30}
      KAFKA_BOOTSTRAP: kafka:29092

  analytics:
    build: ./analytics
    container_name: swiftpay-analytics
    depends_on:
      kafka:
        condition: service_started
      ledger-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-30}
      KAFKA_BOOTSTRAP: kafka:29092

  # On demand: docker compose --profile loadtest run --rm k6 run ...
  k6:
    image: grafana/k6:0.57.0
    profiles:
      - loadtest
    volumes:
      - ./load-test:/scripts:ro
      - ./load-test/results:/results
    environment:
      BASE_URL: http://payment-gateway:8080
    depends_on:
      - payment-gateway
    networks:
      - default
