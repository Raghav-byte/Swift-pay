<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" font-family="Consolas,Menlo,monospace">
  <rect width="520" height="200" rx="8" fill="#450a0a"/>
  <text x="20" y="32" font-size="13" fill="#fecaca">Redis CLI (gateway only)</text>
  <text x="20" y="62" font-size="12" fill="#fef2f2">127.0.0.1:6379&gt; KEYS swiftpay:*</text>
  <text x="20" y="88" font-size="11" fill="#fca5a5">1) "swiftpay:idempotency:aaaaaaaa-0000-0000-0000-000000000001"</text>
  <text x="20" y="108" font-size="11" fill="#fca5a5">2) "swiftpay:balance:b0000001-0000-0000-0000-000000000001"</text>
  <text x="20" y="140" font-size="11" fill="#fed7aa">127.0.0.1:6379&gt; GET swiftpay:idempotency:aaaaaaaa-...</text>
  <text x="20" y="160" font-size="11" fill="#bbf7d0">"processed"</text>
  <text x="20" y="185" font-size="10" fill="#94a3b8">TTL idempotency: 86400s � balance cache: 30s</text>
</svg>
