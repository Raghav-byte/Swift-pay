<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="system-ui,Segoe UI,sans-serif">
  <rect width="720" height="320" fill="#fffbeb"/>
  <text x="360" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#78350f">Prepared statement failure under transaction pooling</text>
  <g font-size="12" fill="#334155">
    <rect x="40" y="55" width="640" height="42" rx="6" fill="#fff" stroke="#f59e0b"/>
    <text x="60" y="82">1. Gateway opens transaction � JDBC prepares INSERT as server-side name <tspan font-weight="600" fill="#b45309">S_82</tspan> on backend connection <tspan font-weight="600">A</tspan></text>
    <rect x="40" y="108" width="640" height="42" rx="6" fill="#fff" stroke="#f59e0b"/>
    <text x="60" y="135">2. Transaction commits � PgBouncer returns connection <tspan font-weight="600">A</tspan> to the pool</text>
    <rect x="40" y="161" width="640" height="42" rx="6" fill="#fff" stroke="#f59e0b"/>
    <text x="60" y="188">3. Next request gets backend connection <tspan font-weight="600">B</tspan> (logical JDBC connection may look reused)</text>
    <rect x="40" y="214" width="640" height="42" rx="6" fill="#fef2f2" stroke="#dc2626"/>
    <text x="60" y="241">4. Driver sends EXECUTE <tspan font-weight="600" fill="#b91c1c">S_82</tspan> � Postgres on <tspan font-weight="600">B</tspan>: ERROR prepared statement "S_82" does not exist � HTTP 500</text>
  </g>
  <text x="360" y="295" text-anchor="middle" font-size="11" fill="#92400e">Fix: prepareThreshold=0 + hibernate.jdbc.use_server_prepared_stmts=false</text>
</svg>
